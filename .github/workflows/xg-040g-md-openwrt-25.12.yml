name: Build_XG_040G_MD_OpenWrt_25_12

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      log_switch:
        description: "Build logs"
        required: false
        default: false
        type: boolean
  push:
    branches:
      - main
    paths:
      - ".github/workflows/xg-040g-md-openwrt-25.12.yml"
      - "config/**"
      - "scripts/**"
      - "feeds.conf.default"

env:
  CONFIG_FILE: "config/xg-040g-md.config"
  REPO_URL: https://github.com/xiangtailiang/openwrt.git
  REPO_BRANCH: openwrt-25.12
  FEEDS_CONF: feeds.conf.default
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  KEEP_RELEASES: 20
  KEEP_RELEASE_MARKER: "[keep-release]"
  CCACHE_DIR: /mnt/openwrt/ccache
  CCACHE_MAXSIZE: 5G
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true

      - name: Space usage check
        run: df -h

      - name: Setup environment dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
          TZ: ${{ env.TZ }}
        run: |
          sudo apt update
          sudo apt purge -y python3-distutils || true
          sudo apt autoremove -y
          sudo apt install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
            python3-setuptools rsync swig unzip zlib1g-dev file wget \
            mkbootimg device-tree-compiler ccache
          if command -v mkbootimg >/dev/null 2>&1; then
            echo "mkbootimg found at: $(command -v mkbootimg)"
          else
            echo "❌ mkbootimg not found in PATH!"
          fi

          if [[ -n "$TZ" ]]; then
            sudo timedatectl set-timezone "$TZ"
          else
            echo "TZ is not set, skipping timezone setup."
          fi

      - name: Ensure Python build tools
        run: |
          python3 -m pip install --upgrade pip setuptools wheel
          python3 -m pip install Unidecode

      - name: Clone OpenWrt source code (openwrt-25.12)
        run: |
          git clone --depth 1 --branch "$REPO_BRANCH" "$REPO_URL" openwrt

      - name: Move build dirs to /mnt/openwrt
        run: |
          sudo mkdir -p /mnt/openwrt/{dl,staging_dir,build_dir,ccache}
          sudo chown -R "$USER:$(id -gn)" /mnt/openwrt
          rm -rf openwrt/dl openwrt/staging_dir openwrt/build_dir
          ln -sfn /mnt/openwrt/dl openwrt/dl
          ln -sfn /mnt/openwrt/staging_dir openwrt/staging_dir
          ln -sfn /mnt/openwrt/build_dir openwrt/build_dir
          df -h

      - name: Restore dl cache
        uses: actions/cache@v4
        with:
          path: /mnt/openwrt/dl
          key: ${{ runner.os }}-openwrt-${{ env.REPO_BRANCH }}-dl-${{ hashFiles('feeds.conf.default') }}
          restore-keys: |
            ${{ runner.os }}-openwrt-${{ env.REPO_BRANCH }}-dl-

      - name: Restore ccache
        uses: actions/cache/restore@v4
        with:
          path: /mnt/openwrt/ccache
          key: ${{ runner.os }}-openwrt-${{ env.REPO_BRANCH }}-ccache-v2-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-openwrt-${{ env.REPO_BRANCH }}-ccache-v2-

      - name: Setup ccache
        run: |
          mkdir -p "$CCACHE_DIR"
          ccache -M "$CCACHE_MAXSIZE"
          echo "ccache dir: $CCACHE_DIR"
          ccache -s

      - name: Update & Install feeds
        working-directory: ./openwrt
        run: |
          # 添加 iStore 官方 feed 源
          echo "" >> feeds.conf.default
          echo "src-git istore https://github.com/linkease/istore;main" >> feeds.conf.default
          
          # 验证 1/8：确认 feed 源添加成功
          echo "=== 验证 1/8：检查 iStore feed 源 ==="
          if grep -q "istore" feeds.conf.default; then
            echo "✅ iStore feed 源已添加"
          else
            echo "❌ iStore feed 源添加失败"
            cat feeds.conf.default
            exit 1
          fi
          
          # 更新 feeds
          ./scripts/feeds update -a
          
          # 验证 2/8：确认能识别到 iStore 包
          echo ""
          echo "=== 验证 2/8：检查 iStore 包是否可识别 ==="
          if ./scripts/feeds list | grep -q "luci-app-store"; then
            echo "✅ 能识别到 luci-app-store 包"
          else
            echo "❌ 识别不到 luci-app-store 包"
            ./scripts/feeds list | grep -i store
            exit 1
          fi
          
          # 安装 iStore 相关包
          ./scripts/feeds install -a -f
          ./scripts/feeds install -d y -p istore luci-app-store
          
          # 验证 3/8：确认 4 个关键包都安装了
          echo ""
          echo "=== 验证 3/8：检查 iStore 关键包是否安装 ==="
          packages=("luci-app-store" "luci-lib-taskd" "luci-lib-xterm" "taskd")
          all_ok=true
          for pkg in "${packages[@]}"; do
            if [ -f "package/feeds/istore/$pkg/Makefile" ]; then
              echo "  ✅ $pkg 已安装"
            else
              echo "  ❌ $pkg 未找到"
              all_ok=false
            fi
          done
          if [ "$all_ok" = false ]; then
            echo "❌ 部分包未安装"
            exit 1
          fi
          echo "✅ 所有 iStore 关键包都已安装"
          
          # 修复 1：iStore 条件依赖兼容性 bug（OpenWrt 25.12 用 apk 不用 opkg）
          echo ""
          echo "=== 修复 1：条件依赖兼容性 bug ==="
          sed -i '/LUCI_DEPENDS+=.*opkg/c\LUCI_DEPENDS+=+apk-mbedtls +luci-compat' package/feeds/istore/luci-app-store/Makefile
          
          # 修复 2：iStore 不存在的依赖 bug（apk 体系下这三个包不存在，由 busybox/LuCI 替代）
          echo "=== 修复 2：移除不存在的依赖 ==="
          sed -i 's/+tar +libuci-lua +mount-utils //' package/feeds/istore/luci-app-store/Makefile
          
          # 验证 4/8：确认两个修复都生效了
          echo ""
          echo "=== 验证 4/8：检查依赖修复是否生效 ==="
          depends_line=$(grep "LUCI_DEPENDS:=" package/feeds/istore/luci-app-store/Makefile)
          depends_line2=$(grep "LUCI_DEPENDS+=" package/feeds/istore/luci-app-store/Makefile)
          echo "第一行依赖：$depends_line"
          echo "第二行依赖：$depends_line2"
          
          # 检查是否移除了三个不存在的依赖
          if echo "$depends_line" | grep -q "tar\|libuci-lua\|mount-utils"; then
            echo "❌ 不存在的依赖未移除干净"
            exit 1
          else
            echo "✅ 不存在的依赖已移除"
          fi
          
          # 检查是否修复了条件依赖
          if echo "$depends_line2" | grep -q "apk-mbedtls" && echo "$depends_line2" | grep -q "luci-compat"; then
            if echo "$depends_line2" | grep -q "opkg"; then
              echo "❌ opkg 依赖未移除"
              exit 1
            else
              echo "✅ 条件依赖已修复为 apk-mbedtls + luci-compat"
            fi
          else
            echo "❌ 条件依赖修复失败"
            exit 1
          fi

      - name: Install third-party packages
        working-directory: ./openwrt/package
        run: |
          chmod +x $GITHUB_WORKSPACE/scripts/update-packages.sh
          bash $GITHUB_WORKSPACE/scripts/update-packages.sh
          
      - name: Hotfix rust llvm CI option
        working-directory: ./openwrt
        run: |
          sed -i 's/--set=llvm.download-ci-llvm=true/--set=llvm.download-ci-llvm=false/'             feeds/packages/lang/rust/Makefile
          grep -n "download-ci-llvm" feeds/packages/lang/rust/Makefile

      - name: Copy configuration and defconfig
        run: |
          cp -fv "${CONFIG_FILE}" openwrt/.config
          
          # 验证 5/8：defconfig 前检查 iStore 包是否完好
          echo "=== 验证 5/8：defconfig 前检查 iStore 包 ==="
          cd openwrt
          if [ -f "package/feeds/istore/luci-app-store/Makefile" ]; then
            echo "✅ iStore 包完好"
            # 再确认一下修复还在
            if grep -q "apk-mbedtls" package/feeds/istore/luci-app-store/Makefile; then
              echo "✅ 依赖修复仍然有效"
            else
              echo "❌ 依赖修复丢失了"
              exit 1
            fi
          else
            echo "❌ iStore 包被删掉了"
            exit 1
          fi
          
          # 执行 defconfig
          echo ""
          echo "=== 执行 make defconfig ==="
          make defconfig
          
          # 验证 6/8：defconfig 后检查 iStore 是否开启
          echo ""
          echo "=== 验证 6/8：检查 iStore 是否被开启 ==="
          if grep -q "CONFIG_PACKAGE_luci-app-store=y" .config; then
            echo "✅ luci-app-store 已开启（官方方式成功）"
            ISTORE_MODE="official"
          else
            echo "⚠️ 官方方式失败，执行 fallback..."
            echo "诊断信息："
            echo "  - CONFIG_PACKAGE_luci-app-store 是否存在：$(grep -c "CONFIG_PACKAGE_luci-app-store" .config)"
            echo "  - 依赖包状态："
            echo "    luci-lib-taskd: $(grep "CONFIG_PACKAGE_luci-lib-taskd" .config || echo "not found")"
            echo "    luci-compat: $(grep "CONFIG_PACKAGE_luci-compat" .config || echo "not found")"
            echo "    luci-lib-xterm: $(grep "CONFIG_PACKAGE_luci-lib-xterm" .config || echo "not found")"
            echo "    taskd: $(grep "CONFIG_PACKAGE_taskd" .config || echo "not found")"
            
            # Fallback：手动添加 iStore 配置
            echo ""
            echo "=== 执行 fallback：手动添加 iStore 配置 ==="
            echo "CONFIG_PACKAGE_luci-app-store=y" >> .config
            echo "CONFIG_PACKAGE_luci-lib-taskd=y" >> .config
            echo "CONFIG_PACKAGE_luci-lib-xterm=y" >> .config
            echo "CONFIG_PACKAGE_taskd=y" >> .config
            echo "CONFIG_PACKAGE_luci-compat=y" >> .config
            
            # 再次确认
            if grep -q "CONFIG_PACKAGE_luci-app-store=y" .config; then
              echo "✅ fallback 成功"
              ISTORE_MODE="fallback"
            else
              echo "❌ fallback 也失败了"
              exit 1
            fi
          fi
          
          # 验证 7/8：检查 iStore 相关依赖包（警告模式，不影响编译）
          echo ""
          echo "=== 验证 7/8：检查 iStore 相关包 ==="
          pkgs=("luci-lib-taskd" "taskd" "luci-compat" "luci-lib-xterm")
          all_ok=true
          for pkg in "${pkgs[@]}"; do
            if grep -q "CONFIG_PACKAGE_${pkg}=y" .config; then
              echo "  ✅ $pkg 已开启"
            else
              echo "  ⚠️ $pkg 未开启（警告，不影响编译）"
              all_ok=false
            fi
          done
          if [ "$all_ok" = true ]; then
            echo "✅ 所有 iStore 相关包都已开启"
          else
            echo "⚠️ 部分包未开启（警告模式，继续编译）"
          fi
          
          # 记录结果
          echo "ISTORE_MODE=$ISTORE_MODE" >> $GITHUB_ENV
          echo ""
          echo "=== iStore 集成模式：$ISTORE_MODE ==="
          
          # 保存最终配置
          [ -e .config ] && cp .config defconfig-final.config

      - name: Upload build config files
        uses: actions/upload-artifact@v6
        with:
          name: build-config
          path: |
            config/xg-040g-md.config
            openwrt/defconfig-final.config
            openwrt/feeds.conf.default

      - name: Download packages
        working-directory: ./openwrt
        run: |
          make download -j4 V=s
          # Remove small incomplete files <1KB
          find dl -size -1024c -delete

      - name: Compile OpenWrt firmware
        id: compile
        run: |
          cd openwrt
          echo "Disk usage before compile:"
          df -h
          if [[ "${{ inputs.log_switch }}" == "true" ]]; then
            make -j1 V=s || {
              echo "Compile failed, disk usage diagnostics:"
              df -h
              du -h -d1 . | sort -h | tail -n 30
              exit 1
            }
          else
            make -j$(nproc) || {
              echo "Compile failed, disk usage diagnostics:"
              df -h
              du -h -d1 . | sort -h | tail -n 30
              exit 1
            }
          fi
          DEVICE_NAME=$(grep -o 'CONFIG_TARGET.*DEVICE_[^=]*=y' .config | head -1 | sed 's/.*DEVICE_\(.*\)=y/\1/')
          if [[ -n "$DEVICE_NAME" ]]; then
            echo "DEVICE_NAME=_${DEVICE_NAME}" >> "$GITHUB_ENV"
          fi
          echo "FILE_DATE=_$(date +%Y%m%d%H%M)" >> "$GITHUB_ENV"
          echo "status=success" >> $GITHUB_OUTPUT
          echo "ccache stats (env CCACHE_DIR=$CCACHE_DIR):"
          ccache -s || true

      - name: Save ccache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: /mnt/openwrt/ccache
          key: ${{ runner.os }}-openwrt-${{ env.REPO_BRANCH }}-ccache-v2-${{ github.run_id }}

      - name: Verify iStore compile result
        if: always()
        run: |
          cd openwrt
          echo "=== 验证 8/8：检查 iStore 包编译结果 ==="
          echo "iStore 集成模式：${{ env.ISTORE_MODE }}"
          echo ""
          
          packages=("luci-app-store" "luci-lib-taskd" "luci-lib-xterm" "taskd")
          success=0
          total=${#packages[@]}
          
          for pkg in "${packages[@]}"; do
            # 搜索所有 apk 文件
            count=$(find bin/packages -name "${pkg}_*.apk" 2>/dev/null | wc -l)
            if [ "$count" -gt 0 ]; then
              echo "  ✅ $pkg 编译成功（找到 $count 个包）"
              success=$((success + 1))
            else
              echo "  ❌ $pkg 未找到编译产物"
            fi
          done
          
          echo ""
          if [ "$success" -eq "$total" ]; then
            echo "✅ 所有 $total 个 iStore 包都编译成功！"
          else
            echo "⚠️ 成功编译 $success / $total 个包"
          fi
          
          echo ""
          echo "=== 总结 ==="
          echo "iStore 集成模式：${{ env.ISTORE_MODE }}"
          echo "编译成功包数：$success / $total"

      - name: Prepare firmware artifacts path
        id: organize
        if: env.UPLOAD_FIRMWARE == 'true'
        run: |
          cd openwrt/bin/targets/*/*
          rm -rf packages
          echo "FIRMWARE=$PWD" >> $GITHUB_ENV

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v6
        if: env.UPLOAD_FIRMWARE == 'true'
        with:
          name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
          path: ${{ env.FIRMWARE }}/*

      - name: Generate release tag and notes
        id: tag
        if: env.UPLOAD_RELEASE == 'true'
        run: |
          echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
          cat <<EOF > release.txt
          🚀 OpenWrt firmware for XG-040G-MD (openwrt-25.12)
          ----------------------
          设备型号: XG-040G-MD
          构建时间: $(date +"%Y-%m-%d %H:%M")
          内核版本: 6.12.X
          源码仓库: $REPO_URL
          分支: $REPO_BRANCH
          EOF

      - name: Publish GitHub Release
        uses: ncipollo/release-action@v1
        if: env.UPLOAD_RELEASE == 'true'
        with:
          tag: ${{ steps.tag.outputs.release_tag }}
          bodyFile: release.txt
          artifacts: |
            ${{ env.FIRMWARE }}/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          retain_days: 7
          keep_minimum_runs: 5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup old GitHub Releases
        if: env.UPLOAD_RELEASE == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KEEP_RELEASES: ${{ env.KEEP_RELEASES }}
          KEEP_RELEASE_MARKER: ${{ env.KEEP_RELEASE_MARKER }}
        run: bash scripts/cleanup-old-releases.sh
