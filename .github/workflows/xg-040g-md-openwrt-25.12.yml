name: Build_XG_040G_MD_OpenWrt_25_12

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      log_switch:
        description: "Build logs"
        required: false
        default: false
        type: boolean
  push:
    branches:
      - main
    paths:
      - ".github/workflows/xg-040g-md-openwrt-25.12.yml"
      - "config/**"
      - "scripts/**"
      - "feeds.conf.default"

env:
  CONFIG_FILE: "config/xg-040g-md.config"
  REPO_URL: https://github.com/xiangtailiang/openwrt.git
  REPO_BRANCH: openwrt-25.12
  FEEDS_CONF: feeds.conf.default
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  KEEP_RELEASES: 20
  KEEP_RELEASE_MARKER: "[keep-release]"
  CCACHE_DIR: /mnt/openwrt/ccache
  CCACHE_MAXSIZE: 5G
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true

      - name: Space usage check
        run: df -h

      - name: Setup environment dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
          TZ: ${{ env.TZ }}
        run: |
          sudo apt update
          sudo apt purge -y python3-distutils || true
          sudo apt autoremove -y
          sudo apt install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
            python3-setuptools rsync swig unzip zlib1g-dev file wget \
            mkbootimg device-tree-compiler ccache
          if command -v mkbootimg >/dev/null 2>&1; then
            echo "mkbootimg found at: $(command -v mkbootimg)"
          else
            echo "❌ mkbootimg not found in PATH!"
          fi

          if [[ -n "$TZ" ]]; then
            sudo timedatectl set-timezone "$TZ"
          else
            echo "TZ is not set, skipping timezone setup."
          fi

      - name: Ensure Python build tools
        run: |
          python3 -m pip install --upgrade pip setuptools wheel
          python3 -m pip install Unidecode

      - name: Clone OpenWrt source code (openwrt-25.12)
        run: |
          git clone --depth 1 --branch "$REPO_BRANCH" "$REPO_URL" openwrt

      - name: Move build dirs to /mnt/openwrt
        run: |
          sudo mkdir -p /mnt/openwrt/{dl,staging_dir,build_dir,ccache}
          sudo chown -R "$USER:$(id -gn)" /mnt/openwrt
          rm -rf openwrt/dl openwrt/staging_dir openwrt/build_dir
          ln -sfn /mnt/openwrt/dl openwrt/dl
          ln -sfn /mnt/openwrt/staging_dir openwrt/staging_dir
          ln -sfn /mnt/openwrt/build_dir openwrt/build_dir
          df -h

      - name: Restore dl cache
        uses: actions/cache@v4
        with:
          path: /mnt/openwrt/dl
          key: ${{ runner.os }}-openwrt-${{ env.REPO_BRANCH }}-dl-${{ hashFiles('feeds.conf.default') }}
          restore-keys: |
            ${{ runner.os }}-openwrt-${{ env.REPO_BRANCH }}-dl-

      - name: Restore ccache
        uses: actions/cache/restore@v4
        with:
          path: /mnt/openwrt/ccache
          key: ${{ runner.os }}-openwrt-${{ env.REPO_BRANCH }}-ccache-v2-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-openwrt-${{ env.REPO_BRANCH }}-ccache-v2-

      - name: Setup ccache
        run: |
          mkdir -p "$CCACHE_DIR"
          ccache -M "$CCACHE_MAXSIZE"
          echo "ccache dir: $CCACHE_DIR"
          ccache -s

      - name: Update & Install feeds
        working-directory: ./openwrt
        run: |
          # 追加 iStore feed 源
          echo "" >> feeds.conf.default
          echo 'src-git istore https://github.com/linkease/istore;main' >> feeds.conf.default
          
          # 验证 1/8：确认 feed 添加成功
          echo "=== 验证 1/8：检查 feeds.conf.default ==="
          if grep -q "istore" feeds.conf.default; then
            echo "✅ iStore feed 已添加"
          else
            echo "❌ iStore feed 未添加"
            exit 1
          fi
          
          # 更新所有 feeds
          ./scripts/feeds update -a
          
          # 验证 2/8：确认能识别到 luci-app-store 包
          echo ""
          echo "=== 验证 2/8：检查 iStore 包是否可识别 ==="
          if ./scripts/feeds list | grep -q "luci-app-store"; then
            echo "✅ luci-app-store 包可识别"
          else
            echo "❌ 找不到 luci-app-store 包"
            exit 1
          fi
          
          # 安装所有 feeds
          ./scripts/feeds install -a -f
          
          # 验证 3/8：确认 4 个关键包都安装了
          echo ""
          echo "=== 验证 3/8：检查 iStore 包是否安装 ==="
          missing_pkgs=""
          for pkg in luci-app-store luci-lib-taskd luci-lib-xterm taskd; do
            if [ -f "package/feeds/istore/$pkg/Makefile" ]; then
              echo "✅ $pkg 已安装"
            else
              echo "❌ $pkg 未安装"
              missing_pkgs="$missing_pkgs $pkg"
            fi
          done
          if [ -n "$missing_pkgs" ]; then
            echo "以下包缺失：$missing_pkgs"
            exit 1
          fi
          
          # 修复 iStore 条件依赖兼容性 bug（apk 虚拟包问题）
          echo ""
          echo "=== 修复 iStore 条件依赖兼容性 bug ==="
          sed -i '/LUCI_DEPENDS+=.*opkg/c\LUCI_DEPENDS+=+apk-mbedtls +luci-compat' package/feeds/istore/luci-app-store/Makefile
          
          # 验证 4/8：确认修复成功
          echo ""
          echo "=== 验证 4/8：检查条件依赖修复 ==="
          if grep -q "+apk-mbedtls +luci-compat" package/feeds/istore/luci-app-store/Makefile; then
            echo "✅ 条件依赖已修复为 +apk-mbedtls +luci-compat"
            if grep -q "+opkg" package/feeds/istore/luci-app-store/Makefile; then
              echo "⚠️  仍然存在 opkg 依赖，请检查"
            else
              echo "✅ opkg 依赖已移除"
            fi
          else
            echo "❌ 条件依赖修复失败"
            echo "当前内容："
            grep "LUCI_DEPENDS" package/feeds/istore/luci-app-store/Makefile
            exit 1
          fi

      - name: Install third-party packages
        working-directory: ./openwrt/package
        run: |
          chmod +x $GITHUB_WORKSPACE/scripts/update-packages.sh
          bash $GITHUB_WORKSPACE/scripts/update-packages.sh
          
      - name: Hotfix rust llvm CI option
        working-directory: ./openwrt
        run: |
          sed -i 's/--set=llvm.download-ci-llvm=true/--set=llvm.download-ci-llvm=false/'             feeds/packages/lang/rust/Makefile
          grep -n "download-ci-llvm" feeds/packages/lang/rust/Makefile

      - name: Copy configuration and defconfig
        run: |
          cp -fv "${CONFIG_FILE}" openwrt/.config
          cd openwrt
          
          # 验证 5/8：defconfig 前检查
          echo "=== 验证 5/8：defconfig 前检查 ==="
          if [ -f "package/feeds/istore/luci-app-store/Makefile" ]; then
            echo "✅ iStore 包完好"
            if grep -q "+apk-mbedtls +luci-compat" package/feeds/istore/luci-app-store/Makefile; then
              echo "✅ 条件依赖修复仍然有效"
            else
              echo "❌ 条件依赖修复丢失了"
              exit 1
            fi
          else
            echo "❌ iStore 包被删除了"
            exit 1
          fi
          
          # 运行 defconfig
          echo ""
          echo "=== 运行 make defconfig ==="
          make defconfig
          
          # 验证 6/8：检查 iStore 是否开启
          echo ""
          echo "=== 验证 6/8：检查 iStore 是否开启 ==="
          if grep -q "CONFIG_PACKAGE_luci-app-store=y" .config; then
            echo "✅ luci-app-store 已开启（官方方式成功）"
            echo "ISTORE_MODE=official" >> "$GITHUB_ENV"
          else
            echo "⚠️  官方方式失败，执行 fallback..."
            echo ""
            echo "=== 诊断信息 ==="
            echo "tmp/.packageinfo 里有没有 luci-app-store："
            grep -c "luci-app-store" tmp/.packageinfo || echo "0"
            echo ""
            echo "luci-lib-taskd 状态："
            grep "CONFIG_PACKAGE_luci-lib-taskd" .config || echo "未找到"
            echo ""
            echo "luci-compat 状态："
            grep "CONFIG_PACKAGE_luci-compat" .config || echo "未找到"
            echo ""
            echo "=== 执行 fallback：手动开启 iStore ==="
            # 手动添加 iStore 相关包的配置
            cat >> .config << 'EOF'
CONFIG_PACKAGE_luci-app-store=y
CONFIG_PACKAGE_luci-lib-taskd=y
CONFIG_PACKAGE_luci-lib-xterm=y
CONFIG_PACKAGE_taskd=y
CONFIG_PACKAGE_luci-compat=y
EOF
            echo "✅ Fallback 完成，iStore 已手动开启"
            echo "ISTORE_MODE=fallback" >> "$GITHUB_ENV"
          fi
          
          # 验证 7/8：检查 iStore 相关包状态（警告模式，不影响编译）
          echo ""
          echo "=== 验证 7/8：检查 iStore 相关包状态 ==="
          all_ok=true
          for pkg in luci-app-store luci-lib-taskd luci-lib-xterm taskd luci-compat; do
            if grep -q "CONFIG_PACKAGE_${pkg}=y" .config; then
              echo "✅ $pkg 已开启"
            else
              echo "⚠️  $pkg 未开启"
              all_ok=false
            fi
          done
          if [ "$all_ok" = true ]; then
            echo "✅ 所有 iStore 相关包都已开启"
          else
            echo "⚠️  部分包未开启，可能影响功能，但继续编译"
          fi
          
          [ -e .config ] && cp .config defconfig-final.config

      - name: Upload build config files
        uses: actions/upload-artifact@v6
        with:
          name: build-config
          path: |
            config/xg-040g-md.config
            openwrt/defconfig-final.config
            openwrt/feeds.conf.default

      - name: Download packages
        working-directory: ./openwrt
        run: |
          make download -j4 V=s
          # Remove small incomplete files <1KB
          find dl -size -1024c -delete

      - name: Compile OpenWrt firmware
        id: compile
        run: |
          cd openwrt
          echo "Disk usage before compile:"
          df -h
          if [[ "${{ inputs.log_switch }}" == "true" ]]; then
            make -j1 V=s || {
              echo "Compile failed, disk usage diagnostics:"
              df -h
              du -h -d1 . | sort -h | tail -n 30
              exit 1
            }
          else
            make -j$(nproc) || {
              echo "Compile failed, disk usage diagnostics:"
              df -h
              du -h -d1 . | sort -h | tail -n 30
              exit 1
            }
          fi
          DEVICE_NAME=$(grep -o 'CONFIG_TARGET.*DEVICE_[^=]*=y' .config | head -1 | sed 's/.*DEVICE_\(.*\)=y/\1/')
          if [[ -n "$DEVICE_NAME" ]]; then
            echo "DEVICE_NAME=_${DEVICE_NAME}" >> "$GITHUB_ENV"
          fi
          echo "FILE_DATE=_$(date +%Y%m%d%H%M)" >> "$GITHUB_ENV"
          echo "status=success" >> $GITHUB_OUTPUT
          echo "ccache stats (env CCACHE_DIR=$CCACHE_DIR):"
          ccache -s || true

      - name: Save ccache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: /mnt/openwrt/ccache
          key: ${{ runner.os }}-openwrt-${{ env.REPO_BRANCH }}-ccache-v2-${{ github.run_id }}

      - name: Verify iStore compile result
        if: always()
        run: |
          cd openwrt
          echo "=== 验证 8/8：检查 iStore 编译结果 ==="
          echo "iStore 集成模式：$ISTORE_MODE"
          echo ""
          
          found_count=0
          total_count=4
          for pkg in luci-app-store luci-lib-taskd luci-lib-xterm taskd; do
            # 搜索 apk 包（25.12 用 apk）
            pkg_file=$(find bin/packages/ -name "${pkg}_*.apk" 2>/dev/null | head -1)
            if [ -n "$pkg_file" ]; then
              echo "✅ $pkg 编译成功：$pkg_file"
              found_count=$((found_count + 1))
            else
              echo "❌ $pkg 未找到编译产物"
            fi
          done
          
          echo ""
          echo "=== 总结 ==="
          echo "iStore 集成模式：$ISTORE_MODE"
          echo "成功编译：$found_count / $total_count 个包"
          if [ "$found_count" -eq "$total_count" ]; then
            echo "✅ iStore 集成成功！"
          else
            echo "⚠️  部分包编译失败"
          fi

      - name: Prepare firmware artifacts path
        id: organize
        if: env.UPLOAD_FIRMWARE == 'true'
        run: |
          cd openwrt/bin/targets/*/*
          rm -rf packages
          echo "FIRMWARE=$PWD" >> $GITHUB_ENV

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v6
        if: env.UPLOAD_FIRMWARE == 'true'
        with:
          name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
          path: ${{ env.FIRMWARE }}/*

      - name: Generate release tag and notes
        id: tag
        if: env.UPLOAD_RELEASE == 'true'
        run: |
          echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
          cat <<EOF > release.txt
          🚀 OpenWrt firmware for XG-040G-MD (openwrt-25.12)
          ----------------------
          设备型号: XG-040G-MD
          构建时间: $(date +"%Y-%m-%d %H:%M")
          内核版本: 6.12.X
          源码仓库: $REPO_URL
          分支: $REPO_BRANCH
          EOF

      - name: Publish GitHub Release
        uses: ncipollo/release-action@v1
        if: env.UPLOAD_RELEASE == 'true'
        with:
          tag: ${{ steps.tag.outputs.release_tag }}
          bodyFile: release.txt
          artifacts: |
            ${{ env.FIRMWARE }}/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          retain_days: 7
          keep_minimum_runs: 5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup old GitHub Releases
        if: env.UPLOAD_RELEASE == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KEEP_RELEASES: ${{ env.KEEP_RELEASES }}
          KEEP_RELEASE_MARKER: ${{ env.KEEP_RELEASE_MARKER }}
        run: bash scripts/cleanup-old-releases.sh
