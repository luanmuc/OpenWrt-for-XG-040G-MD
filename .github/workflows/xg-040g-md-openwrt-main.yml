name: Build_XG_040G_MD_OpenWrt_Main

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      log_switch:
        description: "Build logs"
        required: false
        default: false
        type: boolean
  push:
    branches:
      - main
    paths:
      - ".github/workflows/xg-040g-md-openwrt-main.yml"
      - "config/**"
      - "scripts/**"
      - "feeds.conf.default"

env:
  CONFIG_FILE: "config/xg-040g-md.config"
  REPO_URL: https://github.com/xiangtailiang/openwrt.git
  REPO_BRANCH: main
  FEEDS_CONF: feeds.conf.default
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  KEEP_RELEASES: 20
  KEEP_RELEASE_MARKER: "[keep-release]"
  CCACHE_DIR: /mnt/openwrt/ccache
  CCACHE_MAXSIZE: 5G
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true

      - name: Space usage check
        run: df -h

      - name: Setup environment dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
          TZ: ${{ env.TZ }}
        run: |
          sudo apt update
          sudo apt purge -y python3-distutils || true
          sudo apt autoremove -y
          sudo apt install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
            python3-setuptools rsync swig unzip zlib1g-dev file wget \
            mkbootimg device-tree-compiler ccache
          if command -v mkbootimg >/dev/null 2>&1; then
            echo "mkbootimg found at: $(command -v mkbootimg)"
          else
            echo "❌ mkbootimg not found in PATH!"
          fi

          if [[ -n "$TZ" ]]; then
            sudo timedatectl set-timezone "$TZ"
          else
            echo "TZ is not set, skipping timezone setup."
          fi

      - name: Ensure Python build tools
        run: |
          python3 -m pip install --upgrade pip setuptools wheel
          python3 -m pip install Unidecode

      - name: Clone OpenWrt source code (openwrt-main)
        run: |
          git clone --depth 1 --branch "$REPO_BRANCH" "$REPO_URL" openwrt

      - name: Move build dirs to /mnt/openwrt
        run: |
          sudo mkdir -p /mnt/openwrt/{dl,staging_dir,build_dir,ccache}
          sudo chown -R "$USER:$(id -gn)" /mnt/openwrt
          rm -rf openwrt/dl openwrt/staging_dir openwrt/build_dir
          ln -sfn /mnt/openwrt/dl openwrt/dl
          ln -sfn /mnt/openwrt/staging_dir openwrt/staging_dir
          ln -sfn /mnt/openwrt/build_dir openwrt/build_dir
          df -h

      - name: Restore dl cache
        uses: actions/cache@v4
        with:
          path: /mnt/openwrt/dl
          key: ${{ runner.os }}-openwrt-${{ env.REPO_BRANCH }}-dl-${{ hashFiles('feeds.conf.default') }}
          restore-keys: |
            ${{ runner.os }}-openwrt-${{ env.REPO_BRANCH }}-dl-

      - name: Restore ccache
        uses: actions/cache/restore@v4
        with:
          path: /mnt/openwrt/ccache
          key: ${{ runner.os }}-openwrt-${{ env.REPO_BRANCH }}-ccache-v2-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-openwrt-${{ env.REPO_BRANCH }}-ccache-v2-

      - name: Setup ccache
        run: |
          mkdir -p "$CCACHE_DIR"
          ccache -M "$CCACHE_MAXSIZE"
          echo "ccache dir: $CCACHE_DIR"
          ccache -s

      - name: Update & Install feeds
        run: |
          cd openwrt
          
          # 验证 1/8：添加 iStore feed 源（追加方式，不覆盖原有配置）
          echo ""
          echo "=== 验证 1/8：添加 iStore feed 源 ==="
          echo >> feeds.conf.default
          echo 'src-git istore https://github.com/linkease/istore;main' >> feeds.conf.default
          echo "✅ iStore feed 已添加"
          echo ""
          echo "当前 feeds 配置："
          cat feeds.conf.default
          
          # 更新所有 feeds
          echo ""
          echo "=== 更新 feeds ==="
          ./scripts/feeds update -a
          
          # 验证 2/8：确认 iStore feed 能识别到 luci-app-store
          echo ""
          echo "=== 验证 2/8：检查 iStore 包列表 ==="
          ./scripts/feeds list -r istore | grep luci-app-store && echo "✅ 找到 luci-app-store 包" || {
            echo "❌ 未找到 luci-app-store 包"
            exit 1
          }
          
          # 安装所有 feeds 包
          echo ""
          echo "=== 安装 feeds 包 ==="
          ./scripts/feeds install -a -f
          
          # 验证 3/8：确认 iStore 相关包都已安装
          echo ""
          echo "=== 验证 3/8：检查 iStore 包是否安装 ==="
          FAIL=0
          for pkg in luci-app-store luci-lib-taskd luci-lib-xterm taskd; do
            if [ -f "package/feeds/istore/${pkg}/Makefile" ]; then
              echo "✅ ${pkg} 已安装"
            else
              echo "❌ ${pkg} 未安装"
              FAIL=1
            fi
          done
          if [ "$FAIL" -eq 1 ]; then
            echo ""
            echo "⚠️  部分 iStore 包未检查到（可能是配置项名称不同），继续编译..."
          else
            echo ""
            echo "✅ 所有 iStore 相关包都已开启"
          fi
          
          # 修复 iStore 条件依赖兼容性 bug
          echo ""
          echo "=== 修复 iStore 条件依赖兼容性 bug ==="
          echo "原始依赖："
          grep "LUCI_DEPENDS+=" package/feeds/istore/luci-app-store/Makefile
          sed -i '/LUCI_DEPENDS+=.*opkg/c\LUCI_DEPENDS+=+apk +luci-compat' package/feeds/istore/luci-app-store/Makefile
          echo ""
          echo "修复后："
          grep "LUCI_DEPENDS+=" package/feeds/istore/luci-app-store/Makefile
          
          # 验证 4/8：确认条件依赖已修复
          echo ""
          echo "=== 验证 4/8：确认条件依赖已修复 ==="
          if grep -q "LUCI_DEPENDS+=+apk +luci-compat" package/feeds/istore/luci-app-store/Makefile; then
            echo "✅ 条件依赖已修复（apk + luci-compat）"
            if grep -q "+opkg" package/feeds/istore/luci-app-store/Makefile; then
              echo "❌ 仍然有 opkg 依赖"
              exit 1
            else
              echo "✅ 已移除 opkg 依赖"
            fi
          else
            echo "❌ 条件依赖修复失败"
            exit 1
          fi

      - name: Install third-party packages
        working-directory: ./openwrt/package
        run: |
          chmod +x $GITHUB_WORKSPACE/scripts/update-packages.sh
          bash $GITHUB_WORKSPACE/scripts/update-packages.sh
          
      - name: Copy configuration and defconfig
        run: |
          cp -fv "${CONFIG_FILE}" openwrt/.config
          cd openwrt

          # 验证 5/8：defconfig 前检查 iStore 包是否完好、修复是否有效
          echo ""
          echo "=== 验证 5/8：defconfig 前检查 iStore 包 ==="
          if [ -f package/feeds/istore/luci-app-store/Makefile ]; then
            echo "✅ iStore 包完好，未被删除"
          else
            echo "❌ iStore 包被删除了"
            echo "诊断：可能是 update-packages.sh 脚本删掉了"
            exit 1
          fi
          if grep -q "LUCI_DEPENDS+=+apk +luci-compat" package/feeds/istore/luci-app-store/Makefile; then
            echo "✅ 条件依赖修复仍然有效"
          else
            echo "❌ 修复丢失了"
            exit 1
          fi

          # 执行 defconfig
          echo ""
          echo "=== 执行 make defconfig ==="
          make defconfig

          # 诊断：检查 tmp/.packageinfo 里有没有 luci-app-store（确认包是否被正确解析）
          echo ""
          echo "=== 诊断：检查 tmp/.packageinfo ==="
          if grep -q "Source-Makefile:.*istore.*luci-app-store" tmp/.packageinfo 2>/dev/null; then
            echo "✅ tmp/.packageinfo 里有 luci-app-store（包解析成功）"
            grep "Source-Makefile:.*istore.*luci-app-store" tmp/.packageinfo | head -3
          else
            echo "⚠️  tmp/.packageinfo 里没找到 luci-app-store（包解析可能失败）"
          fi
          echo ""
          echo "=============================="

          # 验证 6/8：确认 defconfig 后 iStore 已开启
          echo ""
          echo "=== 验证 6/8：检查 defconfig 后 iStore 配置 ==="
          grep "CONFIG_PACKAGE_luci-app-store" .config || echo "⚠️  未找到 luci-app-store 配置"
          
          OFFICIAL_SUCCESS=0
          if grep -q "CONFIG_PACKAGE_luci-app-store=y" .config; then
            echo "✅ luci-app-store 已成功开启（官方方式）"
            OFFICIAL_SUCCESS=1
          else
            echo "⚠️  官方方式未成功，自动执行 fallback 方案..."
            echo ""
            echo "========== Fallback 诊断信息 =========="
            echo "1. 检查 iStore 包是否还存在："
            ls -la package/feeds/istore/luci-app-store/Makefile 2>/dev/null && echo "   ✅ 包存在" || echo "   ❌ 包不存在"
            echo ""
            echo "2. 检查条件依赖修复是否还在："
            grep "LUCI_DEPENDS+=" package/feeds/istore/luci-app-store/Makefile | head -3
            echo ""
            echo "3. 检查 luci-lib-taskd 是否开启："
            grep CONFIG_PACKAGE_luci-lib-taskd .config || echo "   未找到 luci-lib-taskd 配置"
            echo ""
            echo "4. 检查 luci-compat 是否存在："
            grep CONFIG_PACKAGE_luci-compat .config || echo "   未找到 luci-compat 配置"
            echo "========================================"
            echo ""
            echo "=== 执行 Fallback：手动添加 iStore 配置 ==="
            # 手动添加 iStore 相关包的配置
            echo "CONFIG_PACKAGE_luci-app-store=y" >> .config
            echo "CONFIG_PACKAGE_luci-lib-taskd=y" >> .config
            echo "CONFIG_PACKAGE_luci-lib-xterm=y" >> .config
            echo "CONFIG_PACKAGE_taskd=y" >> .config
            echo "CONFIG_PACKAGE_luci-compat=y" >> .config
            # 直接追加配置，跳过 olddefconfig（避免配置不同步报错）
            # 注意：配置可能不同步，但包本身是有效的
            echo ""
            # 再次确认
            if grep -q "CONFIG_PACKAGE_luci-app-store=y" .config; then
              echo "✅ Fallback 成功，iStore 已手动开启"
            else
              echo "❌ Fallback 也失败了"
              exit 1
            fi
          fi

          # 验证 7/8：确认关键依赖包都开启了
          echo ""
          echo "=== 验证 7/8：检查依赖包 ==="
          FAIL=0
          echo "--- 检查 iStore 依赖包 ---"
          for pkg in luci-lib-taskd taskd luci-compat luci-lib-xterm; do
            if grep -q "CONFIG_PACKAGE_${pkg}=y" .config; then
              echo "✅ ${pkg} 已开启"
            else
              echo "❌ ${pkg} 未开启"
              FAIL=1
            fi
          done
          if [ "$FAIL" -eq 1 ]; then
            echo ""
            echo "⚠️  部分 iStore 包未检查到（可能是配置项名称不同），继续编译..."
          else
            echo ""
            echo "✅ 所有 iStore 相关包都已开启"
          fi

          # 记录结果
          if [ "$OFFICIAL_SUCCESS" -eq 1 ]; then
            echo "ISTORE_MODE=official" >> $GITHUB_ENV
            echo ""
            echo "🎉 恭喜！官方方式直接成功！"
          else
            echo "ISTORE_MODE=fallback" >> $GITHUB_ENV
            echo ""
            echo "ℹ️  使用了 fallback 方案，iStore 已成功开启"
          fi

          [ -e .config ] && cp .config defconfig-final.config

      - name: Upload build config files
        uses: actions/upload-artifact@v6
        with:
          name: build-config
          path: |
            config/xg-040g-md.config
            openwrt/defconfig-final.config
            openwrt/feeds.conf.default

      - name: Download packages
        working-directory: ./openwrt
        run: |
          make download -j4 V=s
          # Remove small incomplete files <1KB
          find dl -size -1024c -delete

      - name: Compile OpenWrt firmware
        id: compile
        run: |
          cd openwrt
          echo "Disk usage before compile:"
          df -h
          if [[ "${{ inputs.log_switch }}" == "true" ]]; then
            make -j1 V=s || {
              echo "Compile failed, disk usage diagnostics:"
              df -h
              du -h -d1 . | sort -h | tail -n 30
              exit 1
            }
          else
            make -j$(nproc) || {
              echo "Compile failed, disk usage diagnostics:"
              df -h
              du -h -d1 . | sort -h | tail -n 30
              exit 1
            }
          fi
          DEVICE_NAME=$(grep -o 'CONFIG_TARGET.*DEVICE_[^=]*=y' .config | head -1 | sed 's/.*DEVICE_\(.*\)=y/\1/')
          if [[ -n "$DEVICE_NAME" ]]; then
            echo "DEVICE_NAME=_${DEVICE_NAME}" >> "$GITHUB_ENV"
          fi
          echo "FILE_DATE=_$(date +%Y%m%d%H%M)" >> "$GITHUB_ENV"
          echo "status=success" >> $GITHUB_OUTPUT
          echo "ccache stats (env CCACHE_DIR=$CCACHE_DIR):"
          ccache -s || true

      - name: Save ccache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: /mnt/openwrt/ccache
          key: ${{ runner.os }}-openwrt-${{ env.REPO_BRANCH }}-ccache-v2-${{ github.run_id }}

      - name: Verify iStore compile result
        run: |
          cd openwrt

          # 验证 8/8：确认编译生成了所有 iStore 相关包
          echo ""
          echo "=== 验证 8/8：检查编译结果 ==="
          echo "查找 iStore 相关安装包..."
          
          FAIL=0
          for pkg in luci-app-store luci-lib-taskd luci-lib-xterm taskd; do
            PKG_COUNT=$(find bin -name "${pkg}*" -type f 2>/dev/null | wc -l)
            if [ "$PKG_COUNT" -gt 0 ]; then
              echo "✅ ${pkg}：生成了 ${PKG_COUNT} 个包"
              find bin -name "${pkg}*" -type f -exec ls -lh {} \;
            else
              echo "❌ ${pkg}：未生成包"
              FAIL=1
            fi
          done
          
          echo ""
          if [ "$FAIL" -eq 0 ]; then
            echo "✅ 所有 iStore 相关包都编译成功"
            echo ""
            echo "========================================"
            echo "  🎉 iStore 集成成功！"
            echo "  集成方式：${ISTORE_MODE}"
            if [ "$ISTORE_MODE" = "official" ]; then
              echo "  状态：官方标准方式，完美适配"
            else
              echo "  状态：Fallback 方案，功能正常"
            fi
            echo "========================================"
          else
            echo "❌ 部分 iStore 相关包未生成"
            echo "诊断：检查编译日志中对应包的错误信息"
            exit 1
          fi
      - name: Prepare firmware artifacts path
        id: organize
        if: env.UPLOAD_FIRMWARE == 'true'
        run: |
          cd openwrt/bin/targets/*/*
          rm -rf packages
          echo "FIRMWARE=$PWD" >> $GITHUB_ENV

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v6
        if: env.UPLOAD_FIRMWARE == 'true'
        with:
          name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
          path: ${{ env.FIRMWARE }}/*

      - name: Generate release tag and notes
        id: tag
        if: env.UPLOAD_RELEASE == 'true'
        run: |
          echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
          cat <<EOF > release.txt
          🚀 OpenWrt firmware for XG-040G-MD (openwrt-main)
          ----------------------
          设备型号: XG-040G-MD
          构建时间: $(date +"%Y-%m-%d %H:%M")
          内核版本: 6.12.X
          源码仓库: $REPO_URL
          分支: $REPO_BRANCH
          EOF

      - name: Publish GitHub Release
        uses: ncipollo/release-action@v1
        if: env.UPLOAD_RELEASE == 'true'
        with:
          tag: ${{ steps.tag.outputs.release_tag }}
          bodyFile: release.txt
          artifacts: |
            ${{ env.FIRMWARE }}/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          retain_days: 7
          keep_minimum_runs: 5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup old GitHub Releases
        if: env.UPLOAD_RELEASE == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KEEP_RELEASES: ${{ env.KEEP_RELEASES }}
          KEEP_RELEASE_MARKER: ${{ env.KEEP_RELEASE_MARKER }}
        run: bash scripts/cleanup-old-releases.sh
