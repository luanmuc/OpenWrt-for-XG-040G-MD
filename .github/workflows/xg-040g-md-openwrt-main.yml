name: Build_XG_040G_MD_OpenWrt_Main

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      log_switch:
        description: "Build logs"
        required: false
        default: false
        type: boolean
  push:
    branches:
      - main
    paths:
      - ".github/workflows/xg-040g-md-openwrt-main.yml"
      - "config/**"
      - "scripts/**"
      - "feeds.conf.default"

env:
  CONFIG_FILE: "config/xg-040g-md.config"
  REPO_URL: https://github.com/xiangtailiang/openwrt.git
  REPO_BRANCH: main
  FEEDS_CONF: feeds.conf.default
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  KEEP_RELEASES: 20
  KEEP_RELEASE_MARKER: "[keep-release]"
  CCACHE_DIR: /mnt/openwrt/ccache
  CCACHE_MAXSIZE: 5G
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true

      - name: Space usage check
        run: df -h

      - name: Setup environment dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
          TZ: ${{ env.TZ }}
        run: |
          sudo apt update
          sudo apt purge -y python3-distutils || true
          sudo apt autoremove -y
          sudo apt install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
            python3-setuptools rsync swig unzip zlib1g-dev file wget \
            mkbootimg device-tree-compiler ccache
          if command -v mkbootimg >/dev/null 2>&1; then
            echo "mkbootimg found at: $(command -v mkbootimg)"
          else
            echo "❌ mkbootimg not found in PATH!"
          fi

          if [[ -n "$TZ" ]]; then
            sudo timedatectl set-timezone "$TZ"
          else
            echo "TZ is not set, skipping timezone setup."
          fi

      - name: Ensure Python build tools
        run: |
          python3 -m pip install --upgrade pip setuptools wheel
          python3 -m pip install Unidecode

      - name: Clone OpenWrt source code (openwrt-main)
        run: |
          git clone --depth 1 --branch "$REPO_BRANCH" "$REPO_URL" openwrt

      - name: Move build dirs to /mnt/openwrt
        run: |
          sudo mkdir -p /mnt/openwrt/{dl,staging_dir,build_dir,ccache}
          sudo chown -R "$USER:$(id -gn)" /mnt/openwrt
          rm -rf openwrt/dl openwrt/staging_dir openwrt/build_dir
          ln -sfn /mnt/openwrt/dl openwrt/dl
          ln -sfn /mnt/openwrt/staging_dir openwrt/staging_dir
          ln -sfn /mnt/openwrt/build_dir openwrt/build_dir
          df -h

      - name: Restore dl cache
        uses: actions/cache@v4
        with:
          path: /mnt/openwrt/dl
          key: ${{ runner.os }}-openwrt-${{ env.REPO_BRANCH }}-dl-${{ hashFiles('feeds.conf.default') }}
          restore-keys: |
            ${{ runner.os }}-openwrt-${{ env.REPO_BRANCH }}-dl-

      - name: Restore ccache
        uses: actions/cache/restore@v4
        with:
          path: /mnt/openwrt/ccache
          key: ${{ runner.os }}-openwrt-${{ env.REPO_BRANCH }}-ccache-v2-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-openwrt-${{ env.REPO_BRANCH }}-ccache-v2-

      - name: Setup ccache
        run: |
          mkdir -p "$CCACHE_DIR"
          ccache -M "$CCACHE_MAXSIZE"
          echo "ccache dir: $CCACHE_DIR"
          ccache -s


      - name: Update & Install feeds
        run: |
          cd openwrt

          # 1. 添加 iStore 软件商店 feed 源（官方标准方式）
          echo ""
          echo "=== 步骤 1：添加 iStore feed 源 ==="
          echo >> feeds.conf.default
          echo 'src-git istore https://github.com/linkease/istore;main' >> feeds.conf.default

          # 验证 1：确认 feed 已添加
          echo ""
          echo "=== 验证 1：检查 feeds.conf.default ==="
          cat feeds.conf.default
          grep -q "istore" feeds.conf.default && echo "✅ iStore feed 已成功添加" || { echo "❌ iStore feed 添加失败"; exit 1; }

          # 2. 更新所有 feeds
          echo ""
          echo "=== 步骤 2：更新 feeds ==="
          ./scripts/feeds update -a

          # 验证 2：确认 iStore feed 能识别到包
          echo ""
          echo "=== 验证 2：检查 iStore 包列表 ==="
          ./scripts/feeds list -r istore
          ./scripts/feeds list -r istore | grep -q "luci-app-store" && echo "✅ iStore 包能被识别" || { echo "❌ iStore 包无法识别"; exit 1; }

          # 3. 安装所有 feeds 的包
          echo ""
          echo "=== 步骤 3：安装 feeds 包 ==="
          ./scripts/feeds install -a -f

          # 验证 3：确认 iStore 包已安装到 package 目录
          echo ""
          echo "=== 验证 3：检查 iStore 包是否安装 ==="
          ls -la package/feeds/istore/
          [ -f package/feeds/istore/luci-app-store/Makefile ] && echo "✅ luci-app-store 安装成功" || { echo "❌ luci-app-store 安装失败"; exit 1; }
          [ -f package/feeds/istore/luci-lib-taskd/Makefile ] && echo "✅ luci-lib-taskd 安装成功" || { echo "❌ luci-lib-taskd 安装失败"; exit 1; }
          [ -f package/feeds/istore/taskd/Makefile ] && echo "✅ taskd 安装成功" || { echo "❌ taskd 安装失败"; exit 1; }
      - name: Install third-party packages
        working-directory: ./openwrt/package
        run: |
          chmod +x $GITHUB_WORKSPACE/scripts/update-packages.sh
          bash $GITHUB_WORKSPACE/scripts/update-packages.sh
          

      - name: Copy configuration and defconfig
        run: |
          cp -fv "${CONFIG_FILE}" openwrt/.config
          cd openwrt && make defconfig CONFIG_USE_APK=y

          # 验证 4：确认 defconfig 后 iStore 已开启
          echo ""
          echo "=== 验证 4：检查 defconfig 后 iStore 配置 ==="
          grep "CONFIG_PACKAGE_luci-app-store" .config || echo "⚠️  未找到 luci-app-store 配置"
          grep -q "CONFIG_PACKAGE_luci-app-store=y" .config && echo "✅ luci-app-store 已成功开启" || { echo "❌ luci-app-store 未开启"; exit 1; }

          [ -e .config ] && cp .config defconfig-final.config
      - name: Upload build config files
        uses: actions/upload-artifact@v6
        with:
          name: build-config
          path: |
            config/xg-040g-md.config
            openwrt/defconfig-final.config
            openwrt/feeds.conf.default

      - name: Download packages
        working-directory: ./openwrt
        run: |
          make download -j4 V=s
          # Remove small incomplete files <1KB
          find dl -size -1024c -delete

      - name: Compile OpenWrt firmware
        id: compile
        run: |
          cd openwrt
          echo "Disk usage before compile:"
          df -h
          if [[ "${{ inputs.log_switch }}" == "true" ]]; then
            make -j1 V=s || {
              echo "Compile failed, disk usage diagnostics:"
              df -h
              du -h -d1 . | sort -h | tail -n 30
              exit 1
            }
          else
            make -j$(nproc) || {
              echo "Compile failed, disk usage diagnostics:"
              df -h
              du -h -d1 . | sort -h | tail -n 30
              exit 1
            }
          fi
          DEVICE_NAME=$(grep -o 'CONFIG_TARGET.*DEVICE_[^=]*=y' .config | head -1 | sed 's/.*DEVICE_\(.*\)=y/\1/')
          if [[ -n "$DEVICE_NAME" ]]; then
            echo "DEVICE_NAME=_${DEVICE_NAME}" >> "$GITHUB_ENV"
          fi
          echo "FILE_DATE=_$(date +%Y%m%d%H%M)" >> "$GITHUB_ENV"
          echo "status=success" >> $GITHUB_OUTPUT
          echo "ccache stats (env CCACHE_DIR=$CCACHE_DIR):"
          ccache -s || true

      - name: Save ccache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: /mnt/openwrt/ccache
          key: ${{ runner.os }}-openwrt-${{ env.REPO_BRANCH }}-ccache-v2-${{ github.run_id }}

      - name: Prepare firmware artifacts path
        id: organize
        if: env.UPLOAD_FIRMWARE == 'true'
        run: |
          cd openwrt/bin/targets/*/*
          rm -rf packages
          echo "FIRMWARE=$PWD" >> $GITHUB_ENV

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v6
        if: env.UPLOAD_FIRMWARE == 'true'
        with:
          name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
          path: ${{ env.FIRMWARE }}/*

      - name: Generate release tag and notes
        id: tag
        if: env.UPLOAD_RELEASE == 'true'
        run: |
          echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
          cat <<EOF > release.txt
          🚀 OpenWrt firmware for XG-040G-MD (openwrt-main)
          ----------------------
          设备型号: XG-040G-MD
          构建时间: $(date +"%Y-%m-%d %H:%M")
          内核版本: 6.12.X
          源码仓库: $REPO_URL
          分支: $REPO_BRANCH
          EOF

      - name: Publish GitHub Release
        uses: ncipollo/release-action@v1
        if: env.UPLOAD_RELEASE == 'true'
        with:
          tag: ${{ steps.tag.outputs.release_tag }}
          bodyFile: release.txt
          artifacts: |
            ${{ env.FIRMWARE }}/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          retain_days: 7
          keep_minimum_runs: 5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup old GitHub Releases
        if: env.UPLOAD_RELEASE == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KEEP_RELEASES: ${{ env.KEEP_RELEASES }}
          KEEP_RELEASE_MARKER: ${{ env.KEEP_RELEASE_MARKER }}
        run: bash scripts/cleanup-old-releases.sh
