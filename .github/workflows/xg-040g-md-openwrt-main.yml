name: Build_XG_040G_MD_OpenWrt_Main

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      log_switch:
        description: "Build logs"
        required: false
        default: false
        type: boolean
  push:
    branches:
      - main
    paths:
      - ".github/workflows/xg-040g-md-openwrt-main.yml"
      - "config/**"
      - "scripts/**"
      - "feeds.conf.default"

env:
  CONFIG_FILE: "config/xg-040g-md.config"
  REPO_URL: https://github.com/xiangtailiang/openwrt.git
  REPO_BRANCH: main
  FEEDS_CONF: feeds.conf.default
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  KEEP_RELEASES: 20
  KEEP_RELEASE_MARKER: "[keep-release]"
  CCACHE_DIR: /mnt/openwrt/ccache
  CCACHE_MAXSIZE: 5G
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true

      - name: Space usage check
        run: df -h

      - name: Setup environment dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
          TZ: ${{ env.TZ }}
        run: |
          sudo apt update
          sudo apt purge -y python3-distutils || true
          sudo apt autoremove -y
          sudo apt install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
            python3-setuptools rsync swig unzip zlib1g-dev file wget \
            mkbootimg device-tree-compiler ccache
          if command -v mkbootimg >/dev/null 2>&1; then
            echo "mkbootimg found at: $(command -v mkbootimg)"
          else
            echo "❌ mkbootimg not found in PATH!"
          fi

          if [[ -n "$TZ" ]]; then
            sudo timedatectl set-timezone "$TZ"
          else
            echo "TZ is not set, skipping timezone setup."
          fi

      - name: Ensure Python build tools
        run: |
          python3 -m pip install --upgrade pip setuptools wheel
          python3 -m pip install Unidecode

      - name: Clone OpenWrt source code (openwrt-main)
        run: |
          git clone --depth 1 --branch "$REPO_BRANCH" "$REPO_URL" openwrt

      - name: Move build dirs to /mnt/openwrt
        run: |
          sudo mkdir -p /mnt/openwrt/{dl,staging_dir,build_dir,ccache}
          sudo chown -R "$USER:$(id -gn)" /mnt/openwrt
          rm -rf openwrt/dl openwrt/staging_dir openwrt/build_dir
          ln -sfn /mnt/openwrt/dl openwrt/dl
          ln -sfn /mnt/openwrt/staging_dir openwrt/staging_dir
          ln -sfn /mnt/openwrt/build_dir openwrt/build_dir
          df -h

      - name: Restore dl cache
        uses: actions/cache@v4
        with:
          path: /mnt/openwrt/dl
          key: ${{ runner.os }}-openwrt-${{ env.REPO_BRANCH }}-dl-${{ hashFiles('feeds.conf.default') }}
          restore-keys: |
            ${{ runner.os }}-openwrt-${{ env.REPO_BRANCH }}-dl-

      - name: Restore ccache
        uses: actions/cache/restore@v4
        with:
          path: /mnt/openwrt/ccache
          key: ${{ runner.os }}-openwrt-${{ env.REPO_BRANCH }}-ccache-v2-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-openwrt-${{ env.REPO_BRANCH }}-ccache-v2-

      - name: Setup ccache
        run: |
          mkdir -p "$CCACHE_DIR"
          ccache -M "$CCACHE_MAXSIZE"
          echo "ccache dir: $CCACHE_DIR"
          ccache -s

      - name: Clone iStore to package
        working-directory: ./openwrt/package
        run: |
          git clone --depth=1 https://github.com/linkease/istore.git istore
          echo "=== iStore packages ==="
          ls -la istore/luci/

      - name: Update & Install feeds
        working-directory: ./openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a -f

      - name: Install third-party packages
        working-directory: ./openwrt/package
        run: |
          chmod +x $GITHUB_WORKSPACE/scripts/update-packages.sh
          bash $GITHUB_WORKSPACE/scripts/update-packages.sh
          
      - name: Move iStore packages to official feed directories
        working-directory: ./openwrt
        run: |
          echo "=== Moving iStore packages to official feed locations ==="
          
          # LuCI 应用 → 放到 luci feed 的 applications 目录
          cp -r package/istore/luci/luci-app-store package/feeds/luci/applications/
          echo "✅ luci-app-store → feeds/luci/applications/"
          
          # LuCI 库 → 放到 luci feed 的 libs 目录
          cp -r package/istore/luci/luci-lib-taskd package/feeds/luci/libs/
          cp -r package/istore/luci/luci-lib-xterm package/feeds/luci/libs/
          echo "✅ luci-lib-taskd, luci-lib-xterm → feeds/luci/libs/"
          
          # 普通工具包 → 放到 packages feed 的 utils 目录
          cp -r package/istore/luci/taskd package/feeds/packages/utils/
          echo "✅ taskd → feeds/packages/utils/"
          
          # 删除原来的 istore 目录，避免重复
          rm -rf package/istore
          echo "✅ Removed original package/istore directory"
          
          # 验证一下
          echo ""
          echo "=== Verification ==="
          ls -la package/feeds/luci/applications/luci-app-store/Makefile
          ls -la package/feeds/luci/libs/luci-lib-taskd/Makefile
          ls -la package/feeds/packages/utils/taskd/Makefile

      - name: Copy configuration and defconfig
        run: |
          cp -fv "${CONFIG_FILE}" openwrt/.config
          cd openwrt && make defconfig
          [ -e .config ] && cp .config defconfig-final.config

      - name: Verify iStore config
        run: |
          cd openwrt
          echo "=== Checking iStore packages ==="
          if grep -q "CONFIG_PACKAGE_luci-app-store=y" .config; then
            echo "✅ luci-app-store is selected"
          else
            echo "❌ luci-app-store NOT selected"
          fi
          echo "=== iStore dependencies check ==="
          for pkg in luci-lib-taskd curl tar; do
            if grep -q "CONFIG_PACKAGE_${pkg}=y" .config; then
              echo "✅ ${pkg} is selected"
            else
              echo "⚠️  ${pkg} not found (may be auto-included as dependency)"
            fi
          done
          echo "=== All store-related config ==="
          grep -i "store\|taskd" .config || echo "(no store packages found)"

      - name: Upload build config files
        uses: actions/upload-artifact@v6
        with:
          name: build-config
          path: |
            config/xg-040g-md.config
            openwrt/defconfig-final.config
            openwrt/feeds.conf.default

      - name: Download packages
        working-directory: ./openwrt
        run: |
          make download -j4 V=s
          # Remove small incomplete files <1KB
          find dl -size -1024c -delete

      - name: Compile OpenWrt firmware
        id: compile
        run: |
          cd openwrt
          echo "Disk usage before compile:"
          df -h
          if [[ "${{ inputs.log_switch }}" == "true" ]]; then
            make -j1 V=s || {
              echo "Compile failed, disk usage diagnostics:"
              df -h
              du -h -d1 . | sort -h | tail -n 30
              exit 1
            }
          else
            make -j$(nproc) || {
              echo "Compile failed, disk usage diagnostics:"
              df -h
              du -h -d1 . | sort -h | tail -n 30
              exit 1
            }
          fi
          DEVICE_NAME=$(grep -o 'CONFIG_TARGET.*DEVICE_[^=]*=y' .config | head -1 | sed 's/.*DEVICE_\(.*\)=y/\1/')
          if [[ -n "$DEVICE_NAME" ]]; then
            echo "DEVICE_NAME=_${DEVICE_NAME}" >> "$GITHUB_ENV"
          fi
          echo "FILE_DATE=_$(date +%Y%m%d%H%M)" >> "$GITHUB_ENV"
          echo "status=success" >> $GITHUB_OUTPUT
          echo "ccache stats (env CCACHE_DIR=$CCACHE_DIR):"
          ccache -s || true

      - name: Save ccache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: /mnt/openwrt/ccache
          key: ${{ runner.os }}-openwrt-${{ env.REPO_BRANCH }}-ccache-v2-${{ github.run_id }}

      - name: Prepare firmware artifacts path
        id: organize
        if: env.UPLOAD_FIRMWARE == 'true'
        run: |
          cd openwrt/bin/targets/*/*
          rm -rf packages
          echo "FIRMWARE=$PWD" >> $GITHUB_ENV

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v6
        if: env.UPLOAD_FIRMWARE == 'true'
        with:
          name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
          path: ${{ env.FIRMWARE }}/*

      - name: Generate release tag and notes
        id: tag
        if: env.UPLOAD_RELEASE == 'true'
        run: |
          echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
          cat <<EOF > release.txt
          🚀 OpenWrt firmware for XG-040G-MD (openwrt-main)
          ----------------------
          设备型号: XG-040G-MD
          构建时间: $(date +"%Y-%m-%d %H:%M")
          内核版本: 6.12.X
          源码仓库: $REPO_URL
          分支: $REPO_BRANCH
          EOF

      - name: Publish GitHub Release
        uses: ncipollo/release-action@v1
        if: env.UPLOAD_RELEASE == 'true'
        with:
          tag: ${{ steps.tag.outputs.release_tag }}
          bodyFile: release.txt
          artifacts: |
            ${{ env.FIRMWARE }}/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          retain_days: 7
          keep_minimum_runs: 5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup old GitHub Releases
        if: env.UPLOAD_RELEASE == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KEEP_RELEASES: ${{ env.KEEP_RELEASES }}
          KEEP_RELEASE_MARKER: ${{ env.KEEP_RELEASE_MARKER }}
        run: bash scripts/cleanup-old-releases.sh
