---
name: Build_XG_040G_MD_OpenWrt_Main

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      log_switch:
        description: >-
          Build logs (enable = single thread with full log,
          disable = multi-thread fast build)
        required: false
        default: false
        type: boolean
  push:
    branches:
      - main
    paths:
      - ".github/workflows/xg-040g-md-openwrt-main.yml"
      - "config/**"
      - "scripts/**"
      - "feeds.conf.default"

env:
  CONFIG_FILE: "config/xg-040g-md.config"
  REPO_URL: https://github.com/xiangtailiang/openwrt.git
  REPO_BRANCH: main
  FEEDS_CONF: feeds.conf.default
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  KEEP_RELEASES: 20
  KEEP_RELEASE_MARKER: "[keep-release]"
  CCACHE_DIR: /mnt/openwrt/ccache
  CCACHE_MAXSIZE: 5G
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true

      - name: Check disk space after cleanup
        run: df -h

      - name: Setup environment dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
          TZ: ${{ env.TZ }}
        run: |
          echo "=== Installing build dependencies ==="
          sudo apt update -qq
          sudo apt purge -y python3-distutils || true
          sudo apt autoremove -y
          sudo apt install -y -qq \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
            python3-setuptools rsync swig unzip zlib1g-dev file wget \
            mkbootimg device-tree-compiler ccache

          echo ""
          echo "=== Verifying key tools ==="
          if command -v mkbootimg >/dev/null 2>&1; then
            echo "✅ mkbootimg found at: $(command -v mkbootimg)"
          else
            echo "❌ mkbootimg not found in PATH!"
            exit 1
          fi

          if command -v ccache >/dev/null 2>&1; then
            echo "✅ ccache found at: $(command -v ccache)"
          else
            echo "❌ ccache not found in PATH!"
            exit 1
          fi

          echo ""
          echo "=== Setting timezone ==="
          if [[ -n "$TZ" ]]; then
            sudo timedatectl set-timezone "$TZ"
            echo "✅ Timezone set to: $TZ"
          else
            echo "⚠️  TZ is not set, skipping timezone setup."
          fi

      - name: Ensure Python build tools
        run: |
          echo "=== Installing Python build tools ==="
          python3 -m pip install --upgrade pip setuptools wheel -q
          python3 -m pip install Unidecode -q
          echo "✅ Python tools installed successfully"

      - name: Clone OpenWrt source code
        run: |
          echo "=== Cloning OpenWrt source ==="
          echo "Repository: $REPO_URL"
          echo "Branch: $REPO_BRANCH"
          git clone --depth 1 --branch "$REPO_BRANCH" "$REPO_URL" openwrt
          echo "✅ Source code cloned successfully"

      - name: Prepare build directories
        run: |
          echo "=== Preparing build directories ==="
          sudo mkdir -p /mnt/openwrt/{dl,staging_dir,build_dir,ccache}
          sudo chown -R "$USER:$(id -gn)" /mnt/openwrt
          rm -rf openwrt/dl openwrt/staging_dir openwrt/build_dir
          ln -sfn /mnt/openwrt/dl openwrt/dl
          ln -sfn /mnt/openwrt/staging_dir openwrt/staging_dir
          ln -sfn /mnt/openwrt/build_dir openwrt/build_dir
          echo "✅ Build directories ready"
          df -h

      - name: Generate cache keys
        id: cache-keys
        run: |
          echo "=== Generating cache keys ==="
          # Use config hash instead of date for better cache reuse
          CONFIG_HASH=$(sha256sum "$CONFIG_FILE" | cut -c1-8)
          FEEDS_HASH=$(sha256sum "$FEEDS_CONF" | cut -c1-8)
          echo "config_hash=$CONFIG_HASH" >> "$GITHUB_OUTPUT"
          echo "feeds_hash=$FEEDS_HASH" >> "$GITHUB_OUTPUT"
          echo "Config hash: $CONFIG_HASH"
          echo "Feeds hash: $FEEDS_HASH"

      - name: Restore dl cache
        uses: actions/cache@v4
        with:
          path: /mnt/openwrt/dl
          key: ${{ runner.os }}-openwrt-${{ env.REPO_BRANCH }}-dl-${{ steps.cache-keys.outputs.feeds_hash }}
          restore-keys: |
            ${{ runner.os }}-openwrt-${{ env.REPO_BRANCH }}-dl-

      - name: Restore ccache
        uses: actions/cache/restore@v4
        with:
          path: /mnt/openwrt/ccache
          key: ${{ runner.os }}-openwrt-${{ env.REPO_BRANCH }}-ccache-v4-${{ steps.cache-keys.outputs.config_hash }}
          restore-keys: |
            ${{ runner.os }}-openwrt-${{ env.REPO_BRANCH }}-ccache-v4-
            ${{ runner.os }}-openwrt-${{ env.REPO_BRANCH }}-ccache-v3-
            ${{ runner.os }}-openwrt-${{ env.REPO_BRANCH }}-ccache-v2-

      - name: Setup ccache
        run: |
          echo "=== Configuring ccache ==="
          mkdir -p "$CCACHE_DIR"
          ccache -M "$CCACHE_MAXSIZE"
          echo "ccache dir: $CCACHE_DIR"
          echo "ccache max size: $CCACHE_MAXSIZE"
          ccache -s

      - name: Update & Install feeds
        working-directory: ./openwrt
        run: |
          echo "=== Configuring feeds ==="
          # Copy feeds config
          cp "$GITHUB_WORKSPACE/$FEEDS_CONF" feeds.conf.default

          # Add iStore official feed source
          echo "" >> feeds.conf.default
          echo "src-git istore https://github.com/linkease/istore;main" >> feeds.conf.default

          # Verification 1/8: Confirm iStore feed source added
          echo ""
          echo "=== Verification 1/8: Check iStore feed source ==="
          if grep -q "istore" feeds.conf.default; then
            echo "✅ iStore feed source added successfully"
          else
            echo "❌ Failed to add iStore feed source"
            cat feeds.conf.default
            exit 1
          fi

          # Update feeds
          echo ""
          echo "=== Updating feeds ==="
          ./scripts/feeds update -a

          # Verification 2/8: Confirm iStore package is recognizable
          echo ""
          echo "=== Verification 2/8: Check iStore package recognition ==="
          if ./scripts/feeds list | grep -q "luci-app-store"; then
            echo "✅ luci-app-store package is recognizable"
          else
            echo "❌ Cannot recognize luci-app-store package"
            ./scripts/feeds list | grep -i store
            exit 1
          fi

          # Install iStore related packages
          ./scripts/feeds install -a -f
          ./scripts/feeds install -d y -p istore luci-app-store

          # Verification 3/8: Confirm 4 key packages installed
          echo ""
          echo "=== Verification 3/8: Check iStore key packages ==="
          packages=("luci-app-store" "luci-lib-taskd" "luci-lib-xterm" "taskd")
          all_ok=true
          for pkg in "${packages[@]}"; do
            if [ -f "package/feeds/istore/$pkg/Makefile" ]; then
              echo "  ✅ $pkg installed"
            else
              echo "  ❌ $pkg not found"
              all_ok=false
            fi
          done
          if [ "$all_ok" = false ]; then
            echo "❌ Some packages not installed"
            exit 1
          fi
          echo "✅ All iStore key packages installed"

          # Fix 1: iStore conditional dependency compatibility bug
          echo ""
          echo "=== Fix 1: Conditional dependency compatibility ==="
          sed -i '/LUCI_DEPENDS+=.*opkg/c\LUCI_DEPENDS+=+apk-mbedtls +luci-compat' \
            package/feeds/istore/luci-app-store/Makefile

          # Fix 2: Remove non-existent dependencies
          echo "=== Fix 2: Remove non-existent dependencies ==="
          sed -i 's/+tar +libuci-lua +mount-utils //' \
            package/feeds/istore/luci-app-store/Makefile

          # Verification 4/8: Confirm both fixes applied
          echo ""
          echo "=== Verification 4/8: Check dependency fixes ==="
          depends_line=$(grep "LUCI_DEPENDS:=" package/feeds/istore/luci-app-store/Makefile)
          depends_line2=$(grep "LUCI_DEPENDS+=" package/feeds/istore/luci-app-store/Makefile)
          echo "First line deps: $depends_line"
          echo "Second line deps: $depends_line2"

          # Check if non-existent deps removed
          if echo "$depends_line" | grep -q "tar\|libuci-lua\|mount-utils"; then
            echo "❌ Non-existent dependencies not fully removed"
            exit 1
          else
            echo "✅ Non-existent dependencies removed"
          fi

          # Check if conditional dep fixed
          if echo "$depends_line2" | grep -q "apk-mbedtls" && \
             echo "$depends_line2" | grep -q "luci-compat"; then
            if echo "$depends_line2" | grep -q "opkg"; then
              echo "❌ opkg dependency not removed"
              exit 1
            else
              echo "✅ Conditional dependency fixed to apk-mbedtls + luci-compat"
            fi
          else
            echo "❌ Conditional dependency fix failed"
            exit 1
          fi

      - name: Install third-party packages
        working-directory: ./openwrt/package
        run: |
          echo "=== Installing third-party packages ==="
          chmod +x "$GITHUB_WORKSPACE/scripts/update-packages.sh"
          bash "$GITHUB_WORKSPACE/scripts/update-packages.sh"
          echo "✅ Third-party packages installed"

      - name: Hotfix Rust LLVM CI option
        working-directory: ./openwrt
        run: |
          echo "=== Applying Rust LLVM CI hotfix ==="
          sed -i 's/--set=llvm.download-ci-llvm=true/--set=llvm.download-ci-llvm=false/' \
            feeds/packages/lang/rust/Makefile
          grep -n "download-ci-llvm" feeds/packages/lang/rust/Makefile
          echo "✅ Rust LLVM hotfix applied"

      - name: Copy configuration and defconfig
        run: |
          echo "=== Copying configuration ==="
          cp -fv "$CONFIG_FILE" openwrt/.config

          # Verification 5/8: Check iStore package before defconfig
          echo ""
          echo "=== Verification 5/8: Check iStore package before defconfig ==="
          cd openwrt
          if [ -f "package/feeds/istore/luci-app-store/Makefile" ]; then
            echo "✅ iStore package intact"
            if grep -q "apk-mbedtls" package/feeds/istore/luci-app-store/Makefile; then
              echo "✅ Dependency fix still effective"
            else
              echo "❌ Dependency fix lost"
              exit 1
            fi
          else
            echo "❌ iStore package deleted"
            exit 1
          fi

          # Execute defconfig
          echo ""
          echo "=== Running make defconfig ==="
          make defconfig

          # Verification 6/8: Check if iStore is enabled
          echo ""
          echo "=== Verification 6/8: Check iStore enable status ==="
          if grep -q "CONFIG_PACKAGE_luci-app-store=y" .config; then
            echo "✅ luci-app-store enabled (official method succeeded)"
            ISTORE_MODE="official"
          else
            echo "⚠️  Official method failed, executing fallback..."
            echo "Diagnostic info:"
            echo "  - CONFIG_PACKAGE_luci-app-store count: $(grep -c "CONFIG_PACKAGE_luci-app-store" .config)"
            echo "  - Dependency package status:"
            echo "    luci-lib-taskd: $(grep "CONFIG_PACKAGE_luci-lib-taskd" .config || echo "not found")"
            echo "    luci-compat: $(grep "CONFIG_PACKAGE_luci-compat" .config || echo "not found")"
            echo "    luci-lib-xterm: $(grep "CONFIG_PACKAGE_luci-lib-xterm" .config || echo "not found")"
            echo "    taskd: $(grep "CONFIG_PACKAGE_taskd" .config || echo "not found")"

            # Fallback: Manually add iStore config
            echo ""
            echo "=== Executing fallback: manually add iStore config ==="
            echo "CONFIG_PACKAGE_luci-app-store=y" >> .config
            echo "CONFIG_PACKAGE_luci-lib-taskd=y" >> .config
            echo "CONFIG_PACKAGE_luci-lib-xterm=y" >> .config
            echo "CONFIG_PACKAGE_taskd=y" >> .config
            echo "CONFIG_PACKAGE_luci-compat=y" >> .config

            # Verify again
            if grep -q "CONFIG_PACKAGE_luci-app-store=y" .config; then
              echo "✅ Fallback succeeded"
              ISTORE_MODE="fallback"
            else
              echo "❌ Fallback also failed"
              exit 1
            fi
          fi

          # Verification 7/8: Check iStore related dependency packages
          echo ""
          echo "=== Verification 7/8: Check iStore related packages ==="
          pkgs=("luci-lib-taskd" "taskd" "luci-compat" "luci-lib-xterm")
          all_ok=true
          for pkg in "${pkgs[@]}"; do
            if grep -q "CONFIG_PACKAGE_${pkg}=y" .config; then
              echo "  ✅ $pkg enabled"
            else
              echo "  ⚠️  $pkg not enabled (warning, does not affect compilation)"
              all_ok=false
            fi
          done
          if [ "$all_ok" = true ]; then
            echo "✅ All iStore related packages enabled"
          else
            echo "⚠️  Some packages not enabled (warning mode, continue compilation)"
          fi

          # Record result
          echo "ISTORE_MODE=$ISTORE_MODE" >> "$GITHUB_ENV"
          echo ""
          echo "=== iStore integration mode: $ISTORE_MODE ==="

          # Save final config
          [ -e .config ] && cp .config defconfig-final.config

      - name: Upload build config files
        uses: actions/upload-artifact@v6
        with:
          name: build-config
          path: |
            config/xg-040g-md.config
            openwrt/defconfig-final.config
            openwrt/feeds.conf.default

      - name: Download packages
        working-directory: ./openwrt
        run: |
          echo "=== Downloading source packages ==="
          make download -j4 V=s
          # Remove small incomplete files <1KB
          find dl -size -1024c -delete
          echo "✅ All source packages downloaded"

      - name: Compile OpenWrt firmware
        id: compile
        run: |
          cd openwrt
          echo "=== Starting firmware compilation ==="
          echo "Disk usage before compile:"
          df -h

          if [[ "${{ inputs.log_switch }}" == "true" ]]; then
            echo "Mode: Verbose single-thread build (for debugging)"
            make -j1 V=s || {
              echo "❌ Compilation failed"
              echo ""
              echo "=========================================="
              echo "Diagnostic Information"
              echo "=========================================="
              echo ""
              echo "=== System Info ==="
              uname -a
              uptime
              echo ""
              echo "=== Memory Usage ==="
              free -h
              echo ""
              echo "=== Disk Usage ==="
              df -h
              echo ""
              echo "=== Disk Inode Usage ==="
              df -i
              echo ""
              echo "=== Top Processes (by memory) ==="
              ps aux --sort=-%mem | head -20
              echo ""
              echo "=== Top Processes (by CPU) ==="
              ps aux --sort=-%cpu | head -20
              echo ""
              echo "=== Directory Sizes ==="
              du -h -d1 . | sort -h | tail -n 30
              echo ""
              echo "=== ccache Status ==="
              ccache -s || true
              echo ""
              echo "=== Recent Kernel Logs ==="
              dmesg | tail -30 || true
              exit 1
            }
          else
            echo "Mode: Multi-thread fast build"
            make -j$(nproc) || {
              echo "❌ Compilation failed"
              echo ""
              echo "=========================================="
              echo "Diagnostic Information"
              echo "=========================================="
              echo ""
              echo "=== System Info ==="
              uname -a
              uptime
              echo ""
              echo "=== Memory Usage ==="
              free -h
              echo ""
              echo "=== Disk Usage ==="
              df -h
              echo ""
              echo "=== Disk Inode Usage ==="
              df -i
              echo ""
              echo "=== Top Processes (by memory) ==="
              ps aux --sort=-%mem | head -20
              echo ""
              echo "=== Top Processes (by CPU) ==="
              ps aux --sort=-%cpu | head -20
              echo ""
              echo "=== Directory Sizes ==="
              du -h -d1 . | sort -h | tail -n 30
              echo ""
              echo "=== ccache Status ==="
              ccache -s || true
              echo ""
              echo "=== Recent Kernel Logs ==="
              dmesg | tail -30 || true
              exit 1
            }
          fi

          DEVICE_NAME=$(grep -o 'CONFIG_TARGET.*DEVICE_[^=]*=y' .config | head -1 | sed 's/.*DEVICE_\(.*\)=y/\1/')
          if [[ -n "$DEVICE_NAME" ]]; then
            echo "DEVICE_NAME=_${DEVICE_NAME}" >> "$GITHUB_ENV"
          fi
          echo "FILE_DATE=_$(date +%Y%m%d%H%M)" >> "$GITHUB_ENV"
          echo "status=success" >> "$GITHUB_OUTPUT"

          echo ""
          echo "=== ccache Statistics ==="
          echo "CCACHE_DIR=$CCACHE_DIR"
          ccache -s || true

          echo ""
          echo "✅ Compilation completed successfully"

      - name: Save ccache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: /mnt/openwrt/ccache
          key: ${{ runner.os }}-openwrt-${{ env.REPO_BRANCH }}-ccache-v4-${{ steps.cache-keys.outputs.config_hash }}

      - name: Verify iStore compile result
        if: always()
        run: |
          cd openwrt
          echo "=== Verification 8/8: Check iStore compile results ==="
          echo "iStore integration mode: ${{ env.ISTORE_MODE }}"
          echo ""

          # Output diagnostic info first
          echo "=== Diagnostic Info ==="
          echo "bin directory exists: $(ls -d bin 2>/dev/null && echo yes || echo no)"
          echo "bin/packages directory exists: $(ls -d bin/packages 2>/dev/null && echo yes || echo no)"
          echo "Total apk files in bin: $(find bin -name "*.apk" 2>/dev/null | wc -l)"
          echo "APK files containing 'luci': $(find bin -name "*luci*apk" 2>/dev/null | wc -l)"
          echo ""

          packages=("luci-app-store" "luci-lib-taskd" "luci-lib-xterm" "taskd")
          success=0
          total=${#packages[@]}

          for pkg in "${packages[@]}"; do
            # Search entire bin directory with broader pattern
            count=$(find bin -name "*${pkg}*.apk" 2>/dev/null | wc -l)
            if [ "$count" -gt 0 ]; then
              echo "  ✅ $pkg compiled successfully (found $count packages)"
              find bin -name "*${pkg}*.apk" 2>/dev/null | head -3 | sed 's/^/    /'
              success=$((success + 1))
            else
              echo "  ❌ $pkg compile output not found"
            fi
          done

          echo ""
          if [ "$success" -eq "$total" ]; then
            echo "✅ All $total iStore packages compiled successfully!"
          else
            echo "⚠️  Successfully compiled $success / $total packages"
          fi

          echo ""
          echo "=== Summary ==="
          echo "iStore integration mode: ${{ env.ISTORE_MODE }}"
          echo "Successfully compiled packages: $success / $total"

      - name: Prepare firmware artifacts path
        id: organize
        if: env.UPLOAD_FIRMWARE == 'true'
        run: |
          echo "=== Preparing firmware artifacts ==="
          cd openwrt/bin/targets/*/*
          rm -rf packages
          echo "FIRMWARE=$PWD" >> "$GITHUB_ENV"
          echo "✅ Firmware artifacts ready at: $PWD"

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v6
        if: env.UPLOAD_FIRMWARE == 'true'
        with:
          name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
          path: ${{ env.FIRMWARE }}/*

      - name: Generate release tag and notes
        id: tag
        if: env.UPLOAD_RELEASE == 'true'
        run: |
          echo "=== Generating release info ==="
          echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> "$GITHUB_OUTPUT"
          cat <<EOF > release.txt
          🚀 OpenWrt firmware for XG-040G-MD (main)
          ----------------------
          Device Model: XG-040G-MD
          Build Time: $(date +"%Y-%m-%d %H:%M")
          Kernel Version: snapshot
          Source Repo: $REPO_URL
          Branch: $REPO_BRANCH
          iStore Mode: ${{ env.ISTORE_MODE }}
          EOF
          echo "✅ Release info generated"

      - name: Publish GitHub Release
        uses: ncipollo/release-action@v1
        if: env.UPLOAD_RELEASE == 'true'
        with:
          tag: ${{ steps.tag.outputs.release_tag }}
          bodyFile: release.txt
          artifacts: ${{ env.FIRMWARE }}/*
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up old releases
        if: env.UPLOAD_RELEASE == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== Cleaning up old releases ==="
          chmod +x "$GITHUB_WORKSPACE/scripts/cleanup-old-releases.sh"
          bash "$GITHUB_WORKSPACE/scripts/cleanup-old-releases.sh"
          echo "✅ Old releases cleaned up"
